name: Sync Component Versions to tyk-install

on:
  push:
    branches:
      - main
    paths:
      - 'developer-support/release-notes/overview.mdx'
  workflow_dispatch:

jobs:
  sync-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tyk-docs
        uses: actions/checkout@v7.0.1

      - name: Extract versions from overview.mdx
        id: versions
        run: |
          python3 << 'EOF'
          import json, os

          with open('developer-support/release-notes/overview.mdx') as f:
              content = f.read()

          # Extract the releaseData JSON object by counting braces
          marker = 'export const releaseData = '
          start = content.find(marker) + len(marker)
          brace_count, end = 0, start
          for i, char in enumerate(content[start:], start):
              if char == '{':
                  brace_count += 1
              elif char == '}':
                  brace_count -= 1
                  if brace_count == 0:
                      end = i + 1
                      break

          data = json.loads(content[start:end])

          mapping = {
              'tyk-dashboard': 'DASHBOARD_VERSION',
              'tyk-oss-gateway': 'GATEWAY_VERSION',
              'tyk-pump': 'PUMP_VERSION',
              'tyk-developer-portal/tyk-enterprise-developer-portal': 'PORTAL_VERSION',
          }

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              for component in data.get('licensed', []) + data.get('opensource', []):
                  env_var = mapping.get(component['home'])
                  if env_var:
                      version = 'v' + component['latest']
                      out.write(f"{env_var}={version}\n")
                      print(f"{env_var}={version}")
          EOF

      - name: Checkout tyk-install
        uses: actions/checkout@v7.0.1
        with:
          repository: TykTechnologies/tyk-install
          token: ${{ secrets.ORG_GH_TOKEN }}
          path: tyk-install

      - name: Update .env.example versions
        run: |
          cd tyk-install
          sed -i "s|DASHBOARD_VERSION=.*|DASHBOARD_VERSION=${{ steps.versions.outputs.DASHBOARD_VERSION }}|" docker/self-managed/.env.example
          sed -i "s|GATEWAY_VERSION=.*|GATEWAY_VERSION=${{ steps.versions.outputs.GATEWAY_VERSION }}|" docker/self-managed/.env.example
          sed -i "s|PUMP_VERSION=.*|PUMP_VERSION=${{ steps.versions.outputs.PUMP_VERSION }}|" docker/self-managed/.env.example
          sed -i "s|PORTAL_VERSION=.*|PORTAL_VERSION=${{ steps.versions.outputs.PORTAL_VERSION }}|" docker/self-managed/.env.example
          sed -i "s|GATEWAY_VERSION=.*|GATEWAY_VERSION=${{ steps.versions.outputs.GATEWAY_VERSION }}|" docker/hybrid/.env.example
          sed -i "s|PUMP_VERSION=.*|PUMP_VERSION=${{ steps.versions.outputs.PUMP_VERSION }}|" docker/hybrid/.env.example

      - name: Create PR in tyk-install
        run: |
          cd tyk-install
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/sync-versions-$(date +%Y%m%d%H%M)"
          git checkout -b "$BRANCH"
          git add docker/self-managed/.env.example docker/hybrid/.env.example

          if git diff --cached --quiet; then
            echo "No version changes detected — .env.example files are already up to date."
            exit 0
          fi

          git commit -m "chore: sync component versions from tyk-docs release"
          git push origin "$BRANCH"

          gh pr create \
            --repo TykTechnologies/tyk-install \
            --title "chore: sync component versions from tyk-docs release" \
            --body "$(cat <<'BODY'
          ## Summary

          Auto-generated by the [Sync Component Versions](https://github.com/TykTechnologies/tyk-docs/actions/workflows/sync-versions-to-tyk-install.yml) workflow in tyk-docs.

          Updates `docker/self-managed/.env.example` and `docker/hybrid/.env.example` with the latest component versions from [`developer-support/release-notes/overview.mdx`](https://github.com/TykTechnologies/tyk-docs/blob/main/developer-support/release-notes/overview.mdx).

          **Versions updated:**
          - `DASHBOARD_VERSION` → ${{ steps.versions.outputs.DASHBOARD_VERSION }}
          - `GATEWAY_VERSION` → ${{ steps.versions.outputs.GATEWAY_VERSION }}
          - `PUMP_VERSION` → ${{ steps.versions.outputs.PUMP_VERSION }}
          - `PORTAL_VERSION` → ${{ steps.versions.outputs.PORTAL_VERSION }}
          BODY
          )" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.ORG_GH_TOKEN }}
