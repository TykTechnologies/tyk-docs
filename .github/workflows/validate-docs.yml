name: Validate Documentation

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      
    - name: Set up Python
      uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c  # v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade 'pip>=23.0,<25'
        pip install --no-deps 'requests>=2.31.0,<3'
        
    - name: Validate documentation
      run: |
        echo "🔍 Running documentation validation..."
        python scripts/validate_mintlify_docs.py . --validate-redirects --verbose
        
    - name: Validation complete
      if: success()
      run: |
        echo "✅ Documentation validation passed!"
        echo "All links, images, navigation, and redirects are valid."
