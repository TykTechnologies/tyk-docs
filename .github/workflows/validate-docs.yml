name: Validate Documentation

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade 'pip>=23.0,<25'
        pip install --no-deps 'requests>=2.31.0,<3'
        
    - name: Validate documentation
      run: |
        echo "🔍 Running documentation validation..."
        python scripts/validate_mintlify_docs.py . --validate-redirects --verbose
        
    - name: Validation complete
      if: success()
      run: |
        echo "✅ Documentation validation passed!"
        echo "All links, images, navigation, and redirects are valid."
