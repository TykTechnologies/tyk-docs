name: Generate Release Notes

on:
  workflow_dispatch:
    inputs:
      fix_version:
        description: "Jira Fix Version (e.g., Tyk 5.8.0)"
        required: true
        type: string
      product:
        description: "Product to generate release notes for"
        required: true
        type: choice
        options:
          - all
          - gateway
          - dashboard
          - mdcb
          - pump
          - operator
          - sync
        default: all
      release_date:
        description: "Release date in 'DD Month YYYY' format (e.g., 24 March 2026)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tyk-docs
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/release-notes-generator/requirements.txt

      - name: Generate release notes
        env:
          TYK_JIRA_API_TOKEN: ${{ secrets.TYK_JIRA_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.TYK_JIRA_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          cd scripts/release-notes-generator
          product_flag="--all-products"
          if [ "${{ inputs.product }}" != "all" ]; then
            product_flag="--product ${{ inputs.product }}"
          fi

          python3 -m release_notes_generator \
            --fix-version "${{ inputs.fix_version }}" \
            $product_flag \
            --release-date "${{ inputs.release_date }}" \
            --repo-path "${{ github.workspace }}" \
            --verbose
