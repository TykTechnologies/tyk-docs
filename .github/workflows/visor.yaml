name: Visor PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  visor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run Visor
        uses: probelabs/visor@main
        with:
          app-id: $
          private-key: $
          installation-id: $
        env:
          GOOGLE_API_KEY: $
          GITHUB_TOKEN: $
