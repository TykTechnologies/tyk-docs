# Lychee configuration file
# See https://github.com/lycheeverse/lychee#configuration for more details

# Base URL to use for relative links
# base_url = ""

# Number of concurrent requests
threads = 8

# Timeout for each request in seconds
timeout = 20

# Number of retries for failed requests
retry_wait_time = 5
max_retries = 3

# Accepted status codes
accept = [200, 204, 301]

# Exclude specific URLs from checking
exclude = [
    "http://localhost",
    "https://localhost",
    "http://127.0.0.1",
    "example.com",
    "your-tyk-instance.com",
    "linkedin.com",
    "twitter.com",
    "facebook.com"
]

# Include specific URLs for checking (if using exclude_all)
# include = []

# Exclude all private IPs and loopback addresses
exclude_private = true

# Exclude all link-local IPs
exclude_link_local = true

# User agent to use for requests
user_agent = "lychee/0.13.0"

# Verbose output
verbose = "debug"

# Format of the output
# format = "compact" # or "detailed", "json", "markdown"

# Fail on error
# This is handled by the GitHub Action `fail` input
