  "/oauth/authorize":
    get:
      tags:
      - oauth
      summary: OAuth Authorization Endpoint
      description: Handles user authorization requests for OAuth clients.
      parameters:
      - name: response_type
        in: query
        description: Must be 'code'
        required: true
        schema:
          type: string
      - name: client_id
        in: query
        description: Client ID
        required: true
        schema:
          type: string
      - name: redirect_uri
        in: query
        description: Client Redirect URI
        required: true
        schema:
          type: string
      - name: scope
        in: query
        description: Requested scopes (space-separated)
        schema:
          type: string
      - name: state
        in: query
        description: Opaque value to be returned to client
        schema:
          type: string
      - name: code_challenge
        in: query
        description: PKCE Code Challenge (S256)
        required: true
        schema:
          type: string
      - name: code_challenge_method
        in: query
        description: PKCE Code Challenge Method (must be 'S256')
        required: true
        schema:
          type: string
      responses:
        '302':
          description: Redirects to client's redirect_uri with code and state or to
            consent page
          content: {}
        '400':
          description: Invalid request parameters
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/api.ErrorResponse"
        '401':
          description: User not authenticated (redirects to login)
          content: {}
        '404':
          description: Client not found
          content:
            "*/*":
              schema:
                "$ref": "#/components/schemas/api.ErrorResponse"
