openapi: 3.0.1
info:
  title: Midsommar API
  description: This is the API for the Midsommar user and group management system.
  termsOfService: http://swagger.io/terms/
  contact:
    name: API Support
    url: http://www.swagger.io/support
    email: support@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: '1.0'
servers:
- url: "//localhost:8080/api/v1"
paths:
  "/.well-known/oauth-authorization-server":
    get:
      tags:
      - oauth
      summary: OAuth Authorization Server Metadata
      description: Provides metadata about the OAuth authorization server.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/api.OAuthServerMetadata"
  "/analytics/app-interactions-over-time":
    get:
      tags:
      - Analytics
      summary: Get app interactions over time
      description: Get the number of LLM interactions for a specific app over time
      parameters:
      - name: start_date
        in: query
        description: Start date (YYYY-MM-DD)
        required: true
        schema:
          type: string
      - name: end_date
        in: query
        description: End date (YYYY-MM-DD)
        required: true
        schema:
          type: string
      - name: app_id
        in: query
        description: App ID
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: OK
