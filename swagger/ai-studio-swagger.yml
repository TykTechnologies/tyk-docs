paths:
  /.well-known/oauth-authorization-server:
    get:
      description: Provides metadata about the OAuth authorization server.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OAuthServerMetadata'
      summary: OAuth Authorization Server Metadata
      tags:
      - oauth
  /analytics/app-interactions-over-time:
    get:
      consumes:
      - application/json
      description: Get the number of LLM interactions for a specific app over time
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        required: true
        type: string
      - description: App ID
        in: query
        name: app_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/analytics.ChartData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get app interactions over time
      tags:
      - Analytics
  /analytics/budget-usage:
    get:
      consumes:
      - application/json
      description: Returns usage of monthly budgets for apps and LLMs, with optional
        date range for total cost
      parameters:
      - description: Start date (YYYY-MM-DD) for total cost calculation
        in: query
        name: start_date
        type: string
      - description: End date (YYYY-MM-DD) for total cost calculation
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.BudgetUsage'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get current monthly budget usage for apps and LLMs
      tags:
      - Analytics
  /analytics/budget-usage-for-app:
    get:
