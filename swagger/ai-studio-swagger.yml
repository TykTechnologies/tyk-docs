    get:
      description: Handles user authorization requests for OAuth clients.
      parameters:
      - description: Must be 'code'
        in: query
        name: response_type
        required: true
        type: string
      - description: Client ID
        in: query
        name: client_id
        required: true
        type: string
      - description: Client Redirect URI
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: Requested scopes (space-separated)
        in: query
        name: scope
        type: string
      - description: Opaque value to be returned to client
        in: query
        name: state
        type: string
      - description: PKCE Code Challenge (S256)
        in: query
        name: code_challenge
        required: true
        type: string
      - description: PKCE Code Challenge Method (must be 'S256')
        in: query
        name: code_challenge_method
        required: true
        type: string
      responses:
        "302":
          description: Redirects to client's redirect_uri with code and state or to
            consent page
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: User not authenticated (redirects to login)
        "404":
          description: Client not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: OAuth Authorization Endpoint
      tags:
      - oauth
